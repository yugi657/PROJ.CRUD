<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Hospitalar</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        h1, h2 { color: #333; }
        form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 40px0px; margin-bottom: 30px; }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; margin-bottom: 5px; font-weight: bold; }
        .campo input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .btn-deletar { background-color: #dc3545; padding: 5px 10px; font-size: 12px; margin-left: 10px;}
        .btn-deletar:hover { background-color: #c82333; }
        ul { list-style-type: none; padding: 0; }
        li { background: white; padding: 15px; margin-bottom: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <h1>Controle de Pacientes</h1>

    <h2>Cadastrar Novo Paciente</h2>
    <form id="formPaciente">
        <div class="campo">
            <label>Nome Completo:</label>
            <input type="text" id="nome" required>
        </div>
        <div class="campo">
            <label>CPF:</label>
            <input type="text" id="cpf" placeholder="123.456.789-00" required>
        </div>
        <div class="campo">
            <label>Telefone:</label>
            <input type="text" id="telefone" placeholder="19999999999" required>
        </div>
        <div class="campo">
            <label>Data de Nascimento:</label>
            <input type="date" id="data_nascimento" placeholder="AAAA-MM-DD" required>
        </div>
        <button type="submit">Cadastrar Paciente</button>
    </form>

    <h2>Pacientes Cadastrados</h2>
    <button onclick="listarPacientes()">Atualizar Lista</button>
    <ul id="listaPacientes"></ul>

    <script>
        const API_URL = 'http://localhost:3000/pacientes';

        // Função de busca por pacientes (READ)
        async function listarPacientes() {
            try {
                const response = await fetch(API_URL);
                const pacientes = await response.json();
                
                const lista = document.getElementById('listaPacientes');
                lista.innerHTML = ''; // Limpa a lista antes de desenhar

                pacientes.forEach(p => {
                    // Formata a data para o padrão brasileiro
                    const data = new Date(p.data_nascimento).toLocaleDateString('pt-BR', {timeZone: 'UTC'});
                    
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div>
                            <strong>${p.nome}</strong> - CPF: ${p.cpf} | Tel: ${p.telefone} | Nasc: ${dataFormatada}
                        </div>
                        <button class="btn-deletar" onclick="deletarPaciente(${p.id})">Deletar</button>
                    `;
                    lista.appendChild(li);
                });
            } catch (error) {
                alert('Erro ao buscar pacientes do servidor.');
            }
        }

        // Função para enviar um novo paciente (CREATE)
        document.getElementById('formPaciente').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede a página de recarregar

            const dados = {
                nome: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                data_nascimento: document.getElementById('data_nascimento').value
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    alert('Paciente cadastrado com sucesso!');
                    document.getElementById('formPaciente').reset(); // Limpa os campos
                    listarPacientes(); // Atualiza a lista automaticamente
                } else {
                    const erro = await response.json();
                    alert('Erro: ' + (erro.error || 'Verifique os dados (Cpf duplicado?)'));
                }
            } catch (error) {
                alert('Não foi possível conectar ao servidor.');
            }
        });

        // Função para deletar um paciente (DELETE)
        async function deletarPaciente(id) {
            if (confirm('Tem certeza que deseja remover este paciente?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        alert('Paciente removido!');
                        listarPacientes();
                    }
                } catch (error) {
                    alert('Erro ao deletar paciente.');
                }
            }
        }

        // Carrega os dados assim que abre a página
        listarPacientes();
    </script>
</body>
</html>
